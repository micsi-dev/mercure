# Docker Compose override for macOS (including Apple Silicon)
# Usage: docker compose -f docker-compose.yml -f docker-compose.mac.yml up -d --build
#
# This file addresses Mac-specific issues:
# 1. Docker socket permissions (requires root for UI/processor)
# 2. User/group mapping differences on macOS
# 3. Builds all images locally to ensure native ARM64 binaries (e.g., getdcmtags)
#    and that the latest source code is always used
# 4. Uses local image names to avoid pulling from upstream Docker Hub

x-env: &env
  environment:
    MERCURE_RUNNER: docker
    MERCURE_ENV: DEV
    MERCURE_CONFIG_FOLDER: /opt/mercure/config
    REDIS_URL: redis://redis:6379/0

x-volumes: &volumes
  volumes:
    - config:/opt/mercure/config
    - data:/opt/mercure/data

x-volumes-docker: &volumes-docker
  volumes:
    - config:/opt/mercure/config
    - data:/opt/mercure/data
    - /var/run/docker.sock:/var/run/docker.sock

x-local-build: &local-build
  args:
    IMAGE_NAME: mercure-base
    VERSION_TAG: latest

services:
  # Builds the shared base image used by all mercure services.
  # Exits immediately after build — it only exists to produce the base image.
  base:
    build:
      context: ..
      dockerfile: docker/base/Dockerfile
    image: mercure-base:latest
    pull_policy: never
    command: ["true"]

  ui:
    <<: [*env, *volumes-docker]
    build:
      context: ..
      dockerfile: docker/ui/Dockerfile
      <<: *local-build
    image: mercure-ui:latest
    pull_policy: never
    user: root
    depends_on:
      base:
        condition: service_completed_successfully

  processor:
    <<: [*env, *volumes-docker]
    build:
      context: ..
      dockerfile: docker/processor/Dockerfile
      <<: *local-build
    image: mercure-processor:latest
    pull_policy: never
    user: root
    depends_on:
      base:
        condition: service_completed_successfully

  receiver:
    <<: [*env, *volumes]
    build:
      context: ..
      dockerfile: docker/receiver/Dockerfile
      <<: *local-build
    image: mercure-receiver:latest
    pull_policy: never
    depends_on:
      base:
        condition: service_completed_successfully

  cleaner:
    <<: [*env, *volumes]
    build:
      context: ..
      dockerfile: docker/cleaner/Dockerfile
      <<: *local-build
    image: mercure-cleaner:latest
    pull_policy: never
    depends_on:
      base:
        condition: service_completed_successfully

  dispatcher:
    <<: [*env, *volumes]
    build:
      context: ..
      dockerfile: docker/dispatcher/Dockerfile
      <<: *local-build
    image: mercure-dispatcher:latest
    pull_policy: never
    depends_on:
      base:
        condition: service_completed_successfully

  router:
    <<: [*env, *volumes]
    build:
      context: ..
      dockerfile: docker/router/Dockerfile
      <<: *local-build
    image: mercure-router:latest
    pull_policy: never
    depends_on:
      base:
        condition: service_completed_successfully

  bookkeeper:
    <<: [*env, *volumes]
    build:
      context: ..
      dockerfile: docker/bookkeeper/Dockerfile
      <<: *local-build
    image: mercure-bookkeeper:latest
    pull_policy: never
    depends_on:
      base:
        condition: service_completed_successfully

  worker_fast:
    <<: *volumes
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
      <<: *local-build
    image: mercure-worker:latest
    pull_policy: never
    depends_on:
      base:
        condition: service_completed_successfully

  worker_slow:
    <<: *volumes
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
      <<: *local-build
    image: mercure-worker:latest
    pull_policy: never
    depends_on:
      base:
        condition: service_completed_successfully

volumes:
  db-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/opt/mercure/db'

  data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/opt/mercure/data'

  config:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/opt/mercure/config'
